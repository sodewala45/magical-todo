<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magical To-Do List</title>
<style>
:root{
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f0f3f7;
  --color-text-primary: #1f2937;
  --color-text-secondary: #6b7280;
  --color-border-secondary: #d1d5db;
  --color-border-tertiary: #e5e7eb;
  --border-radius-lg: 16px;
  --border-radius-md: 8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:#e9edf2;padding:20px 0}
.app{max-width:400px;margin:0 auto;min-height:600px;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);overflow:hidden;border:0.5px solid var(--color-border-tertiary)}
.header{background:linear-gradient(135deg,#4a90d9,#357abd);padding:20px 16px 16px;text-align:center}
.header h1{color:#fff;font-size:20px;font-weight:500;letter-spacing:0.3px}
.header p{color:rgba(255,255,255,0.8);font-size:12px;margin-top:3px}
.tabs{display:flex;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary)}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:500;color:var(--color-text-secondary);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all 0.2s}
.tab.active{color:#357abd;border-bottom:2px solid #357abd}
.tab i{display:block;font-size:18px;margin-bottom:3px}
.panel{display:none;padding:12px}
.panel.active{display:block}

.task-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--border-radius-md);margin-bottom:8px;border:0.5px solid rgba(0,0,0,0.08);cursor:pointer;transition:all 0.2s}
.task-item.done{background:#d4edda}
.task-item.undone{background:#cfe8f7}
.task-check{width:22px;height:22px;border-radius:4px;border:1.5px solid #aaa;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;background:#fff}
.task-item.done .task-check{background:#28a745;border-color:#28a745;color:#fff}
.task-info{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-item.done .task-name{text-decoration:line-through;color:var(--color-text-secondary)}
.task-reminder{font-size:11px;color:#666;margin-top:2px;display:flex;align-items:center;gap:3px}
.task-actions{display:flex;gap:6px;flex-shrink:0}
.btn-icon{width:28px;height:28px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--color-text-secondary);font-size:15px;transition:all 0.2s}
.btn-icon:hover{background:var(--color-background-secondary)}
.btn-icon.del:hover{color:#dc3545;border-color:#dc3545}
.btn-icon.edt:hover{color:#357abd;border-color:#357abd}
.btn-icon:disabled{opacity:0.3;cursor:default;pointer-events:none}
.btn-icon.mv:hover{color:#357abd;border-color:#357abd}
.btn-clear{width:100%;padding:10px;background:transparent;color:#dc3545;border:0.5px solid #dc3545;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;margin-top:10px}
.btn-clear:hover{background:#dc3545;color:#fff}
.btn-icon:disabled{opacity:0.3;cursor:default;pointer-events:none}
.btn-icon.mv:hover{color:#357abd;border-color:#357abd}

.form-card{background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:16px;border:0.5px solid var(--color-border-tertiary);margin-bottom:12px}
.form-card h3{font-size:14px;font-weight:500;margin-bottom:12px;color:var(--color-text-primary)}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;font-weight:500}
.field input,.field select{width:100%;padding:8px 10px;font-size:13px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary)}
.field input:focus,.field select:focus{outline:none;border-color:#357abd}
.btn-primary{width:100%;padding:10px;background:#357abd;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s}
.btn-primary:hover{background:#2d6fa3}
.btn-danger{background:#dc3545;margin-top:6px}
.btn-danger:hover{background:#c82333}
.edit-mode .btn-primary{background:#28a745}
.edit-mode .btn-primary:hover{background:#218838}

.stats-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px}
.stat-card{background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:12px;text-align:center;border:0.5px solid var(--color-border-tertiary)}
.stat-num{font-size:24px;font-weight:500}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.blue .stat-num{color:#357abd}
.green .stat-num{color:#28a745}
.progress-bar{background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:12px;border:0.5px solid var(--color-border-tertiary)}
.bar-track{background:var(--color-background-secondary);border-radius:20px;height:10px;overflow:hidden;margin:8px 0}
.bar-fill{height:100%;background:#28a745;border-radius:20px;transition:width 0.5s}
.bar-label{display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary)}

.tone-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-top:6px}
.tone-btn{padding:8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);font-size:12px;cursor:pointer;text-align:center;color:var(--color-text-primary);transition:all 0.2s}
.tone-btn.selected{background:#cfe8f7;border-color:#357abd;color:#357abd;font-weight:500}

.empty{text-align:center;padding:32px 16px;color:var(--color-text-secondary)}
.empty i{font-size:40px;margin-bottom:8px;display:block;opacity:0.4}
.empty p{font-size:13px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
</head>
<body>

<h2 class="sr-only">Magical To-Do List app with tasks, settings, and progress tracker</h2>

<div class="app">
  <div class="header">
    <h1>✨ Magical To-Do List</h1>
    <p id="date-display"></p>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('tasks')">📋Tasks</button>
    <button class="tab" onclick="showTab('settings')">⚙️Settings</button>
    <button class="tab" onclick="showTab('progress')">📊Progress</button>
  </div>

  <div id="tab-tasks" class="panel active">
    <div id="task-list"></div>
    <button class="btn-clear" id="clear-all-btn" onclick="clearAllChecks()" style="display:none">↻ Clear all checkboxes (new day)</button>
  </div>

  <div id="tab-settings" class="panel">
    <div class="form-card" id="task-form">
      <h3 id="form-title">+ Add new task</h3>
      <div class="field">
        <label>Task name</label>
        <input type="text" id="task-name" placeholder="Enter task...">
      </div>
      <div class="field">
        <label>🔔 Reminder time</label>
        <input type="time" id="reminder-time">
      </div>
      <div class="field">
        <label>🎵 Reminder tone</label>
        <div class="tone-grid" id="tone-grid"></div>
      </div>
      <button class="btn-primary" id="submit-btn" onclick="submitTask()">Add task</button>
      <button class="btn-primary btn-danger" id="cancel-btn" style="display:none" onclick="cancelEdit()">Cancel edit</button>
    </div>

    <div class="form-card">
      <h3>📥 Bulk add tasks</h3>
      <div class="field">
        <label>Paste tasks (one per line)</label>
        <textarea id="bulk-text" placeholder="Task one&#10;Task two&#10;Task three" rows="5" style="width:100%;padding:8px 10px;font-size:13px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);font-family:inherit;resize:vertical"></textarea>
      </div>
      <button class="btn-primary" onclick="bulkAddTasks()">Add all as tasks</button>
    </div>

    <div class="form-card">
      <h3>📄 All tasks</h3>
      <div id="manage-list"></div>
    </div>
  </div>

  <div id="tab-progress" class="panel">
    <div class="stats-row">
      <div class="stat-card blue"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total tasks</div></div>
      <div class="stat-card green"><div class="stat-num" id="stat-done">0</div><div class="stat-label">Completed</div></div>
    </div>
    <div class="progress-bar">
      <div class="bar-label"><span>Progress</span><span id="pct-label">0%</span></div>
      <div class="bar-track"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
      <div class="bar-label" style="margin-top:4px"><span id="remain-label" style="color:var(--color-text-secondary);font-size:11px"></span></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TONES = ['Chime','Bell','Soft ping','Alert'];
const STORAGE_KEY = 'magical_todo_tasks';
const DEFAULT_TASKS = [
  {id:1,name:'Positive change your life / any other 18+ min',done:true,time:'08:00',tone:'Chime'},
  {id:2,name:'Hooponopo body',done:true,time:'09:00',tone:'Bell'},
  {id:3,name:'Hooponopo any 9+ minutes',done:true,time:'09:30',tone:'Chime'},
  {id:4,name:'Diary 10 minutes',done:true,time:'10:00',tone:'Soft ping'},
  {id:5,name:'Heart Magic self Dua for 10 minutes',done:false,time:'11:00',tone:'Bell'},
  {id:6,name:'Shukrana for 10 minutes',done:false,time:'12:00',tone:'Chime'},
  {id:7,name:'40 minutes walk (5 days till 30th June)',done:false,time:'07:00',tone:'Alert'},
  {id:8,name:'2 days/week any of sandra rolus any min 30 min till 30th May',done:false,time:'',tone:'Bell'},
  {id:9,name:'Manzil',done:false,time:'',tone:'Soft ping'},
];

function loadTasks(){
  try{
    const saved=localStorage.getItem(STORAGE_KEY);
    if(saved){
      const parsed=JSON.parse(saved);
      if(Array.isArray(parsed))return parsed;
    }
  }catch(e){console.error('Could not load saved tasks:',e);}
  return DEFAULT_TASKS.map(t=>({...t}));
}

function saveTasks(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify(tasks));
  }catch(e){console.error('Could not save tasks:',e);}
}

let tasks = loadTasks();
let editId = null;
let selTone = 'Chime';

function formatDate(){
  const d=new Date();
  document.getElementById('date-display').textContent=d.toLocaleDateString('en-PK',{weekday:'long',day:'numeric',month:'long'});
}
formatDate();

function showTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',['tasks','settings','progress'][i]===t)});
  document.querySelectorAll('.panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='progress')updateProgress();
  if(t==='settings')renderManage();
}

function renderToneGrid(selected){
  const g=document.getElementById('tone-grid');
  g.innerHTML=TONES.map(t=>`<button class="tone-btn${t===selected?' selected':''}" onclick="selectTone('${t}')">${t}</button>`).join('');
}
renderToneGrid(selTone);

function selectTone(t){
  selTone=t;
  renderToneGrid(t);
}

function renderTasks(){
  const ul=document.getElementById('task-list');
  const clearBtn=document.getElementById('clear-all-btn');
  if(!tasks.length){ul.innerHTML='<div class="empty">📋<p>No tasks yet. Go to Settings to add tasks.</p></div>';clearBtn.style.display='none';return;}
  clearBtn.style.display=tasks.some(t=>t.done)?'block':'none';
  ul.innerHTML=tasks.map(t=>`
    <div class="task-item ${t.done?'done':'undone'}" onclick="toggleTask(${t.id})">
      <div class="task-check" aria-label="${t.done?'Completed':'Mark complete'}">${t.done?'✓':''}</div>
      <div class="task-info">
        <div class="task-name">${t.name}</div>
        ${t.time?`<div class="task-reminder">🔔${t.time} · ${t.tone}</div>`:''}
      </div>
    </div>`).join('');
}

function renderManage(){
  const el=document.getElementById('manage-list');
  if(!tasks.length){el.innerHTML='<p style="font-size:13px;color:var(--color-text-secondary);text-align:center;padding:12px">No tasks yet</p>';return;}
  el.innerHTML=tasks.map((t,i)=>`
    <div class="task-item ${t.done?'done':'undone'}" style="margin-bottom:6px">
      <div class="task-info">
        <div class="task-name">${t.name}</div>
        ${t.time?`<div class="task-reminder">🔔${t.time} · ${t.tone}</div>`:''}
      </div>
      <div class="task-actions">
        <button class="btn-icon mv" onclick="moveTask(${t.id},-1)" aria-label="Move up" ${i===0?'disabled':''}>▲</button>
        <button class="btn-icon mv" onclick="moveTask(${t.id},1)" aria-label="Move down" ${i===tasks.length-1?'disabled':''}>▼</button>
        <button class="btn-icon edt" onclick="startEdit(${t.id})" aria-label="Edit task">✎</button>
        <button class="btn-icon del" onclick="deleteTask(${t.id})" aria-label="Delete task">🗑</button>
      </div>
    </div>`).join('');
}

function bulkAddTasks(){
  const raw=document.getElementById('bulk-text').value;
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  if(!lines.length){showToast('Paste some task lines first');return;}
  lines.forEach((name,i)=>{
    tasks.push({id:Date.now()+i,name,done:false,time:'',tone:'Chime'});
  });
  document.getElementById('bulk-text').value='';
  saveTasks();
  renderTasks();renderManage();updateProgress();
  showToast(`${lines.length} task${lines.length>1?'s':''} added`);
}

function toggleTask(id){
  const t=tasks.find(x=>x.id===id);
  if(t){t.done=!t.done;saveTasks();renderTasks();updateProgress();}
}

function moveTask(id,dir){
  const idx=tasks.findIndex(x=>x.id===id);
  const newIdx=idx+dir;
  if(idx<0||newIdx<0||newIdx>=tasks.length)return;
  [tasks[idx],tasks[newIdx]]=[tasks[newIdx],tasks[idx]];
  saveTasks();
  renderManage();renderTasks();
}

function clearAllChecks(){
  if(!confirm('Uncheck all tasks for a new day?'))return;
  tasks.forEach(t=>t.done=false);
  saveTasks();
  renderTasks();renderManage();updateProgress();
  showToast('All checkboxes cleared \u2014 fresh start!');
}

function submitTask(){
  const name=document.getElementById('task-name').value.trim();
  if(!name){showToast('Please enter a task name');return;}
  const time=document.getElementById('reminder-time').value;
  if(editId){
    const t=tasks.find(x=>x.id===editId);
    if(t){t.name=name;t.time=time;t.tone=selTone;}
    editId=null;
    document.getElementById('form-title').innerHTML='+ Add new task';
    document.getElementById('submit-btn').textContent='Add task';
    document.getElementById('cancel-btn').style.display='none';
    document.getElementById('task-form').classList.remove('edit-mode');
    showToast('Task updated');
  } else {
    tasks.push({id:Date.now(),name,done:false,time,tone:selTone});
    showToast('Task added');
  }
  document.getElementById('task-name').value='';
  document.getElementById('reminder-time').value='';
  selTone='Chime';renderToneGrid(selTone);
  saveTasks();
  renderTasks();renderManage();
}

function startEdit(id){
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  editId=id;
  document.getElementById('task-name').value=t.name;
  document.getElementById('reminder-time').value=t.time||'';
  selTone=t.tone||'Chime';renderToneGrid(selTone);
  document.getElementById('form-title').innerHTML='✎ Edit task';
  document.getElementById('submit-btn').textContent='Save changes';
  document.getElementById('cancel-btn').style.display='block';
  document.getElementById('task-form').classList.add('edit-mode');
  document.getElementById('task-name').focus();
  window.scrollTo(0,0);
}

function cancelEdit(){
  editId=null;
  document.getElementById('task-name').value='';
  document.getElementById('reminder-time').value='';
  document.getElementById('form-title').innerHTML='+ Add new task';
  document.getElementById('submit-btn').textContent='Add task';
  document.getElementById('cancel-btn').style.display='none';
  document.getElementById('task-form').classList.remove('edit-mode');
}

function deleteTask(id){
  if(!confirm('Delete this task?'))return;
  tasks=tasks.filter(x=>x.id!==id);
  saveTasks();
  renderTasks();renderManage();updateProgress();
  showToast('Task deleted');
}

function updateProgress(){
  const total=tasks.length;
  const done=tasks.filter(t=>t.done).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-done').textContent=done;
  document.getElementById('pct-label').textContent=pct+'%';
  document.getElementById('bar-fill').style.width=pct+'%';
  document.getElementById('remain-label').textContent=total-done>0?`${total-done} task${total-done>1?'s':''} remaining`:'All done!';
}

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

renderTasks();updateProgress();
</script>
</body>
</html>
