<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Magical To-Do">
<title>Magical To-Do List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --blue: #cfe8f7;
    --blue-dark: #357abd;
    --blue-border: #a8d1ef;
    --green: #d4edda;
    --green-dark: #28a745;
    --green-border: #a8d5b5;
    --header: #357abd;
    --header2: #2563a8;
    --white: #ffffff;
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #1a2233;
    --muted: #6b7a99;
    --border: #dde3ef;
    --danger: #e53e3e;
    --warning: #f59e0b;
    --radius: 14px;
    --radius-sm: 8px;
  }
  html, body { height: 100%; font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; overflow: hidden; }
  .app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; background: var(--bg); position: relative; }

  /* HEADER */
  .header { background: linear-gradient(135deg, var(--header), var(--header2)); padding: 18px 20px 16px; color: white; flex-shrink: 0; }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.2px; }
  .header h1 span { font-size: 22px; }
  .header-date { font-size: 12px; opacity: 0.85; margin-top: 3px; }
  .progress-mini { margin-top: 12px; }
  .progress-mini-bar { background: rgba(255,255,255,0.25); border-radius: 10px; height: 6px; overflow: hidden; }
  .progress-mini-fill { height: 100%; background: #90ee90; border-radius: 10px; transition: width 0.4s ease; }
  .progress-mini-label { font-size: 11px; opacity: 0.9; margin-top: 4px; }

  /* TABS */
  .tabs { display: flex; background: var(--white); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { flex: 1; padding: 12px 4px 10px; text-align: center; font-size: 11px; font-weight: 500; color: var(--muted); cursor: pointer; border: none; background: transparent; border-bottom: 3px solid transparent; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .tab svg { width: 20px; height: 20px; }
  .tab.active { color: var(--blue-dark); border-bottom-color: var(--blue-dark); }

  /* PANELS */
  .panel { display: none; flex: 1; overflow-y: auto; padding: 14px; -webkit-overflow-scrolling: touch; }
  .panel.active { display: block; }

  /* TASK ITEMS */
  .task-item { display: flex; align-items: center; gap: 12px; padding: 13px 14px; border-radius: var(--radius); margin-bottom: 9px; border: 1.5px solid; transition: all 0.25s; user-select: none; }
  .task-item.undone { background: var(--blue); border-color: var(--blue-border); }
  .task-item.done { background: var(--green); border-color: var(--green-border); }
  .task-checkbox { width: 24px; height: 24px; border-radius: 6px; border: 2px solid #aab; background: white; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .task-item.done .task-checkbox { background: var(--green-dark); border-color: var(--green-dark); }
  .task-checkbox svg { width: 14px; height: 14px; stroke: white; stroke-width: 2.5; fill: none; opacity: 0; transition: opacity 0.2s; }
  .task-item.done .task-checkbox svg { opacity: 1; }
  .task-body { flex: 1; min-width: 0; cursor: pointer; }
  .task-name { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; }
  .task-item.done .task-name { text-decoration: line-through; color: var(--muted); }
  .task-meta { font-size: 11px; color: #5a7a9a; margin-top: 3px; display: flex; align-items: center; gap: 4px; }
  .task-meta svg { width: 11px; height: 11px; flex-shrink: 0; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty svg { width: 56px; height: 56px; opacity: 0.3; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* SETTINGS PANEL */
  .section-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 14px; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }
  .section-title svg { width: 16px; height: 16px; }
  .field { margin-bottom: 12px; }
  .field:last-of-type { margin-bottom: 0; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 5px; }
  .field input, .field select { width: 100%; padding: 10px 12px; font-size: 14px; font-family: 'Poppins', sans-serif; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; }
  .field input:focus, .field select:focus { border-color: var(--blue-dark); }
  .tone-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 7px; margin-top: 5px; }
  .tone-btn { padding: 9px 8px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); font-size: 12px; font-family: 'Poppins', sans-serif; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.2s; text-align: center; }
  .tone-btn.active { background: var(--blue); border-color: var(--blue-dark); color: var(--blue-dark); }
  .btn { width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm); font-size: 14px; font-family: 'Poppins', sans-serif; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
  .btn-add { background: var(--blue-dark); color: white; }
  .btn-add:active { opacity: 0.85; transform: scale(0.98); }
  .btn-save { background: var(--green-dark); color: white; }
  .btn-save:active { opacity: 0.85; }
  .btn-cancel { background: var(--bg); color: var(--muted); border: 1.5px solid var(--border); margin-top: 7px; }

  /* MANAGE LIST */
  .manage-item { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: var(--radius-sm); margin-bottom: 7px; border: 1px solid var(--border); background: var(--bg); }
  .manage-item.done-item { background: var(--green); border-color: var(--green-border); }
  .manage-item.undone-item { background: var(--blue); border-color: var(--blue-border); }
  .manage-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .manage-actions { display: flex; gap: 7px; flex-shrink: 0; }
  .icon-btn { width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid var(--border); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .icon-btn svg { width: 16px; height: 16px; }
  .icon-btn.edit-btn { color: var(--blue-dark); }
  .icon-btn.edit-btn:active { background: var(--blue); border-color: var(--blue-dark); }
  .icon-btn.del-btn { color: var(--danger); }
  .icon-btn.del-btn:active { background: #fef2f2; border-color: var(--danger); }

  /* PROGRESS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px 12px; text-align: center; }
  .stat-number { font-size: 30px; font-weight: 600; }
  .stat-number.blue { color: var(--blue-dark); }
  .stat-number.green { color: var(--green-dark); }
  .stat-number.amber { color: var(--warning); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; font-weight: 500; }
  .progress-section { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; }
  .progress-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .prog-bar-track { background: var(--bg); border-radius: 10px; height: 12px; overflow: hidden; border: 1px solid var(--border); }
  .prog-bar-fill { height: 100%; background: linear-gradient(90deg, #4caf87, var(--green-dark)); border-radius: 10px; transition: width 0.5s ease; }
  .prog-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 7px; }
  .task-breakdown { margin-top: 14px; }
  .breakdown-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--bg); }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .breakdown-name { flex: 1; font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .breakdown-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .badge-done { background: var(--green); color: var(--green-dark); }
  .badge-pending { background: var(--blue); color: var(--blue-dark); }

  /* MODAL OVERLAY */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--white); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text); }

  /* DELETE CONFIRM */
  .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
  .confirm-overlay.show { display: flex; }
  .confirm-box { background: white; border-radius: var(--radius); padding: 24px; width: 100%; max-width: 320px; text-align: center; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  .confirm-icon { width: 48px; height: 48px; background: #fef2f2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
  .confirm-icon svg { width: 24px; height: 24px; color: var(--danger); }
  .confirm-box h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .confirm-box p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .confirm-btns { display: flex; gap: 10px; }
  .confirm-btns button { flex: 1; padding: 11px; border-radius: var(--radius-sm); font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
  .confirm-keep { background: var(--bg); color: var(--muted); border: 1.5px solid var(--border) !important; }
  .confirm-del { background: var(--danger); color: white; }

  /* TOAST */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a2233; color: white; padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 500; z-index: 300; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* FAB */
  .fab { position: fixed; bottom: 76px; right: 20px; width: 52px; height: 52px; background: var(--blue-dark); border: none; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(53,122,189,0.5); z-index: 50; transition: all 0.2s; }
  .fab:active { transform: scale(0.92); }
  .fab svg { width: 26px; height: 26px; }
  .fab.hide { display: none; }
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div>
        <h1><span>✨</span> Magical To-Do</h1>
        <div class="header-date" id="headerDate"></div>
      </div>
    </div>
    <div class="progress-mini">
      <div class="progress-mini-bar"><div class="progress-mini-fill" id="miniBar" style="width:0%"></div></div>
      <div class="progress-mini-label" id="miniLabel"></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('tasks')" id="tab-tasks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Tasks
    </button>
    <button class="tab" onclick="switchTab('settings')" id="tab-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Settings
    </button>
    <button class="tab" onclick="switchTab('progress')" id="tab-progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Progress
    </button>
  </div>

  <!-- TASKS PANEL -->
  <div class="panel active" id="panel-tasks">
    <div id="taskList"></div>
  </div>

  <!-- SETTINGS PANEL -->
  <div class="panel" id="panel-settings">
    <!-- Manage Tasks -->
    <div class="section-card">
      <div class="section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Manage tasks
      </div>
      <div id="manageList"></div>
    </div>

    <!-- Reminder Settings -->
    <div class="section-card">
      <div class="section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        Default reminder tone
      </div>
      <div class="tone-grid" id="globalToneGrid"></div>
      <p style="font-size:11px;color:var(--muted);margin-top:10px;">Selected tone plays when reminder fires</p>
    </div>
  </div>

  <!-- PROGRESS PANEL -->
  <div class="panel" id="panel-progress">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number blue" id="statTotal">0</div><div class="stat-label">Total tasks</div></div>
      <div class="stat-card"><div class="stat-number green" id="statDone">0</div><div class="stat-label">Completed</div></div>
      <div class="stat-card"><div class="stat-number amber" id="statPending">0</div><div class="stat-label">Pending</div></div>
      <div class="stat-card"><div class="stat-number blue" id="statPct">0%</div><div class="stat-label">Progress</div></div>
    </div>
    <div class="progress-section">
      <h3>Overall progress</h3>
      <div class="prog-bar-track"><div class="prog-bar-fill" id="bigBar" style="width:0%"></div></div>
      <div class="prog-labels"><span id="progLeft"></span><span id="progPct"></span></div>
      <div class="task-breakdown" id="taskBreakdown"></div>
    </div>
  </div>
</div>

<!-- FAB (Add task button on tasks tab) -->
<button class="fab hide" id="fabBtn" onclick="openAddModal()" aria-label="Add task">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="taskModal" onclick="handleModalOutsideClick(event)">
  <div class="modal" id="modalBox">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Add new task</div>
    <div class="field">
      <label>Task name *</label>
      <input type="text" id="inputName" placeholder="e.g. Hooponopo body 10 min" autocomplete="off">
    </div>
    <div class="field">
      <label>Reminder time (optional)</label>
      <input type="time" id="inputTime">
    </div>
    <div class="field">
      <label>Reminder tone</label>
      <div class="tone-grid" id="modalToneGrid"></div>
    </div>
    <button class="btn btn-add" id="modalSubmitBtn" onclick="submitModal()">Add task</button>
    <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
    </div>
    <h3>Delete task?</h3>
    <p id="confirmTaskName">This task will be permanently deleted.</p>
    <div class="confirm-btns">
      <button class="confirm-keep" onclick="cancelDelete()">Keep it</button>
      <button class="confirm-del" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const TONES = ['Chime', 'Bell', 'Soft ping', 'Alert'];
const STORAGE_KEY = 'magicalTodo_v2';

let tasks = [];
let editId = null;
let deleteId = null;
let modalTone = 'Chime';
let globalTone = 'Chime';
let currentTab = 'tasks';

// Default tasks
const defaultTasks = [
  { id: 1, name: 'Positive change your life / any other 18+ min', done: true, time: '08:00', tone: 'Chime' },
  { id: 2, name: 'Hooponopo body', done: true, time: '09:00', tone: 'Bell' },
  { id: 3, name: 'Hooponopo any 9+ minutes', done: true, time: '09:30', tone: 'Chime' },
  { id: 4, name: 'Diary 10 minutes', done: true, time: '10:00', tone: 'Soft ping' },
  { id: 5, name: 'Heart Magic self Dua for 10 minutes', done: false, time: '11:00', tone: 'Bell' },
  { id: 6, name: 'Shukrana for 10 minutes', done: false, time: '12:00', tone: 'Chime' },
  { id: 7, name: '40 minutes walk (5 days till 30th June)', done: false, time: '07:00', tone: 'Alert' },
  { id: 8, name: '2 days/week any of sandra rolus min 30 min till 30th May', done: false, time: '', tone: 'Bell' },
  { id: 9, name: 'Manzil', done: false, time: '', tone: 'Soft ping' },
];

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      tasks = d.tasks || defaultTasks;
      globalTone = d.globalTone || 'Chime';
    } else {
      tasks = JSON.parse(JSON.stringify(defaultTasks));
    }
  } catch(e) { tasks = JSON.parse(JSON.stringify(defaultTasks)); }
}

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks, globalTone })); } catch(e) {}
}

function setDate() {
  const d = new Date();
  document.getElementById('headerDate').textContent = d.toLocaleDateString('en-PK', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  document.getElementById('fabBtn').classList.toggle('hide', tab !== 'tasks');
  if (tab === 'settings') { renderManageList(); renderGlobalTone(); }
  if (tab === 'progress') renderProgress();
}

// ── TASKS ──
function renderTasks() {
  const el = document.getElementById('taskList');
  if (!tasks.length) {
    el.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><p>No tasks yet.<br>Tap + to add your first task.</p></div>`;
    return;
  }
  el.innerHTML = tasks.map(t => `
    <div class="task-item ${t.done ? 'done' : 'undone'}" id="ti-${t.id}">
      <div class="task-checkbox" onclick="toggleTask(${t.id})" role="checkbox" aria-checked="${t.done}" aria-label="Mark as ${t.done ? 'incomplete' : 'complete'}">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="task-body" onclick="toggleTask(${t.id})">
        <div class="task-name">${escHtml(t.name)}</div>
        ${t.time ? `<div class="task-meta"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${t.time} · ${t.tone}</div>` : ''}
      </div>
    </div>`).join('');
  updateHeader();
}

function toggleTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  saveData();
  renderTasks();
  showToast(t.done ? '✅ Task completed!' : '↩ Marked as pending');
}

// ── ADD/EDIT MODAL ──
function openAddModal() {
  editId = null;
  modalTone = globalTone;
  document.getElementById('modalTitle').textContent = 'Add new task';
  document.getElementById('inputName').value = '';
  document.getElementById('inputTime').value = '';
  document.getElementById('modalSubmitBtn').textContent = 'Add task';
  document.getElementById('modalSubmitBtn').className = 'btn btn-add';
  renderModalTone();
  document.getElementById('taskModal').classList.add('show');
  setTimeout(() => document.getElementById('inputName').focus(), 300);
}

function openEditModal(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  editId = id;
  modalTone = t.tone || 'Chime';
  document.getElementById('modalTitle').textContent = 'Edit task';
  document.getElementById('inputName').value = t.name;
  document.getElementById('inputTime').value = t.time || '';
  document.getElementById('modalSubmitBtn').textContent = 'Save changes';
  document.getElementById('modalSubmitBtn').className = 'btn btn-save';
  renderModalTone();
  document.getElementById('taskModal').classList.add('show');
  setTimeout(() => document.getElementById('inputName').focus(), 300);
}

function closeModal() {
  document.getElementById('taskModal').classList.remove('show');
  editId = null;
}

function handleModalOutsideClick(e) {
  if (e.target === document.getElementById('taskModal')) closeModal();
}

function renderModalTone() {
  document.getElementById('modalToneGrid').innerHTML = TONES.map(t =>
    `<button class="tone-btn ${t === modalTone ? 'active' : ''}" onclick="setModalTone('${t}')">${t}</button>`
  ).join('');
}

function setModalTone(t) { modalTone = t; renderModalTone(); }

function submitModal() {
  const name = document.getElementById('inputName').value.trim();
  if (!name) { document.getElementById('inputName').style.borderColor = '#e53e3e'; document.getElementById('inputName').focus(); return; }
  document.getElementById('inputName').style.borderColor = '';
  const time = document.getElementById('inputTime').value;

  if (editId) {
    const t = tasks.find(x => x.id === editId);
    if (t) { t.name = name; t.time = time; t.tone = modalTone; }
    showToast('✏️ Task updated');
  } else {
    tasks.push({ id: Date.now(), name, done: false, time, tone: modalTone });
    showToast('✨ Task added');
  }
  saveData();
  closeModal();
  renderTasks();
  if (currentTab === 'settings') renderManageList();
}

// ── DELETE ──
function promptDelete(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  deleteId = id;
  document.getElementById('confirmTaskName').textContent = `"${t.name.substring(0, 60)}${t.name.length > 60 ? '…' : ''}" will be permanently deleted.`;
  document.getElementById('confirmOverlay').classList.add('show');
}

function cancelDelete() {
  document.getElementById('confirmOverlay').classList.remove('show');
  deleteId = null;
}

function confirmDelete() {
  tasks = tasks.filter(x => x.id !== deleteId);
  saveData();
  document.getElementById('confirmOverlay').classList.remove('show');
  deleteId = null;
  renderTasks();
  renderManageList();
  showToast('🗑️ Task deleted');
}

// ── MANAGE LIST ──
function renderManageList() {
  const el = document.getElementById('manageList');
  if (!tasks.length) {
    el.innerHTML = '<p style="font-size:13px;color:var(--muted);text-align:center;padding:10px 0">No tasks yet. Tap + on the Tasks tab to add one.</p>';
    return;
  }
  el.innerHTML = tasks.map(t => `
    <div class="manage-item ${t.done ? 'done-item' : 'undone-item'}">
      <div class="manage-name" title="${escHtml(t.name)}">${escHtml(t.name)}</div>
      <div class="manage-actions">
        <button class="icon-btn edit-btn" onclick="openEditFromManage(${t.id})" aria-label="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn del-btn" onclick="promptDelete(${t.id})" aria-label="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        </button>
      </div>
    </div>`).join('');
}

function openEditFromManage(id) {
  openEditModal(id);
}

// ── GLOBAL TONE ──
function renderGlobalTone() {
  document.getElementById('globalToneGrid').innerHTML = TONES.map(t =>
    `<button class="tone-btn ${t === globalTone ? 'active' : ''}" onclick="setGlobalTone('${t}')">${t}</button>`
  ).join('');
}

function setGlobalTone(t) { globalTone = t; saveData(); renderGlobalTone(); showToast('🔔 Default tone set: ' + t); }

// ── PROGRESS ──
function renderProgress() {
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const pending = total - done;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statPct').textContent = pct + '%';
  document.getElementById('bigBar').style.width = pct + '%';
  document.getElementById('progLeft').textContent = pending > 0 ? `${pending} remaining` : '🎉 All done!';
  document.getElementById('progPct').textContent = pct + '%';
  document.getElementById('taskBreakdown').innerHTML = tasks.map(t => `
    <div class="breakdown-row">
      <div class="breakdown-dot" style="background:${t.done ? 'var(--green-dark)' : 'var(--blue-dark)'}"></div>
      <div class="breakdown-name">${escHtml(t.name)}</div>
      <span class="breakdown-badge ${t.done ? 'badge-done' : 'badge-pending'}">${t.done ? 'Done' : 'Pending'}</span>
    </div>`).join('');
}

// ── HEADER UPDATE ──
function updateHeader() {
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('miniBar').style.width = pct + '%';
  document.getElementById('miniLabel').textContent = `${done} of ${total} tasks completed · ${pct}%`;
}

// ── TOAST ──
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── UTILS ──
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──
loadData();
setDate();
renderTasks();
</script>
</body>
</html>
